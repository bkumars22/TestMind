spring.application.name=testmind
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/testmind}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:testmind}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:testmind}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
jwt.secret=${JWT_SECRET:dev-secret-change-in-production-must-be-64-chars-minimum-here}
jwt.access-expiry=900000
jwt.refresh-expiry=604800000
ai.engine.url=${AI_ENGINE_URL:http://localhost:8001}
server.port=8080
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
management.endpoints.web.exposure.include=health,prometheus,info
