name: TestMind CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/testmind

jobs:
  backend-test:
    name: Backend Tests (Java 17)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: testmind_test
          POSTGRES_USER: testmind
          POSTGRES_PASSWORD: testmind_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'corretto' }
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
      - name: Run Tests
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testmind_test
          SPRING_DATASOURCE_USERNAME: testmind
          SPRING_DATASOURCE_PASSWORD: testmind_test
          JWT_SECRET: test-secret-64-chars-minimum-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          AI_ENGINE_URL: http://localhost:8001
        run: mvn test -B
      - uses: codecov/codecov-action@v4

  ai-engine-test:
    name: AI Engine Tests (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install dependencies
        working-directory: ai-engine
        run: pip install -r requirements.txt
      - name: Run pytest
        working-directory: ai-engine
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: pytest tests/ --cov=. --cov-report=xml -v
      - uses: codecov/codecov-action@v4

  frontend-test:
    name: Frontend Build + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install & build
        working-directory: frontend
        run: npm ci && npm run build
      - name: Type check
        working-directory: frontend
        run: npm run type-check

  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-test, ai-engine-test, frontend-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Start stack
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          POSTGRES_PASSWORD: testmind_ci
          JWT_SECRET: ci-test-secret-64-chars-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        run: docker compose up -d --build
      - name: Wait for health checks
        run: |
          echo "Waiting for backend..."
          timeout 120 bash -c 'until curl -sf http://localhost:8080/api/health; do sleep 3; done'
          echo "Waiting for frontend..."
          timeout 60 bash -c 'until curl -sf http://localhost:3000; do sleep 3; done'
      - name: Install Playwright
        working-directory: tests
        run: npm ci && npx playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 30
      - name: Tear down
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [e2e-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
      - name: Build and push ai-engine
        uses: docker/build-push-action@v5
        with:
          context: ./ai-engine
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ai-engine:latest
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
      - name: Deploy via Railway CLI
        run: |
          npm i -g @railway/cli
          railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
